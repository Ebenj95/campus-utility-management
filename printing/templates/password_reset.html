{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Campus Portal</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="reset-card" style="background:white;border-radius:20px;padding:2.5rem;max-width:440px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div class="reset-icon">🔑</div>
    <div class="reset-title">Forgot Password?</div>
    <div class="reset-text">Enter your email address and we'll send you a link to reset your password.</div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="text-align:left;">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn-login">Send Reset Link →</button>
    </form>
    <div style="text-align:center;margin-top:1rem;">
      <a href="{% url 'login' %}" style="color:#2563eb;font-weight:600;font-size:0.875rem;text-decoration:none;">← Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
