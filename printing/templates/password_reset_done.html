{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Sent — Campus Portal</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="reset-card" style="background:white;border-radius:20px;padding:2.5rem;max-width:440px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div class="reset-icon">📧</div>
    <div class="reset-title">Check your email</div>
    <div class="reset-text">We've sent a password reset link to your email address. Check your inbox (and spam folder).</div>
    <a href="{% url 'login' %}" class="btn-login" style="display:block;text-align:center;text-decoration:none;padding:0.875rem;border-radius:8px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;font-weight:700;">← Back to Login</a>
  </div>
</div>
</body>
</html>
