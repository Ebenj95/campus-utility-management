{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email — Campus Portal</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
  <style>
    .fp-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .fp-card {
      background: white; border-radius: 24px; width: 100%; max-width: 460px;
      padding: 3rem 2.5rem; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }
    .fp-icon { font-size: 4rem; margin-bottom: 1.25rem; }
    .fp-title { font-size: 1.6rem; font-weight: 800; color: #0f172a; margin-bottom: 0.75rem; }
    .fp-text { color: #64748b; font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem; }
    .fp-warn {
      background: #fef3c7; border: 1.5px solid #fde68a;
      border-radius: 12px; padding: 1rem 1.1rem;
      color: #92400e; font-size: 0.875rem; margin-bottom: 2rem;
      display: flex; gap: 0.5rem; align-items: flex-start; text-align: left;
    }
    .fp-btn {
      display: block; width: 100%; padding: 1rem;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white; border: none; border-radius: 12px;
      font-weight: 700; font-size: 1.05rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .fp-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
  </style>
</head>
<body>
<div class="fp-page">
  <div class="fp-card">
    <div class="fp-icon">📧</div>
    <div class="fp-title">Check your email</div>
    <div class="fp-text">
      If a matching account was found, a password reset link has been sent to the registered email address. Please check your inbox and spam folder.
    </div>
    <div class="fp-warn">
      ⏱️ The reset link expires in <strong>5 minutes</strong>. Use it immediately.
    </div>
    <a href="{% url 'login' %}" class="fp-btn">← Back to Login</a>
  </div>
</div>
</body>
</html>
