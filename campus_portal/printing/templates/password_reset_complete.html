{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset — Campus Portal</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="reset-card" style="background:white;border-radius:20px;padding:2.5rem;max-width:440px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div class="reset-icon">✅</div>
    <div class="reset-title">Password Reset!</div>
    <div class="reset-text">Your password has been set. You can now sign in with your new password.</div>
    <a href="{% url 'login' %}" class="btn-login" style="display:block;text-align:center;text-decoration:none;padding:0.875rem;border-radius:8px;background:linear-gradient(135deg,#22c55e,#16a34a);color:white;font-weight:700;">Sign In →</a>
  </div>
</div>
</body>
</html>
