{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product — Store Admin</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
</head>
<body>

{% include "printing/includes/sidebar.html" %}

<header class="page-header admin">
  <div class="container">
    <a href="{% url 'store_admin_dashboard' %}">← Dashboard</a>
    <h1>✏️ Edit Product</h1>
    <span></span>
  </div>
</header>

<main class="page-content">
<div class="container">
<div style="max-width:620px;margin:0 auto;">

  <div class="card">
    <div class="card-header" style="background:linear-gradient(135deg,#f3e8ff,#e0e7ff);">
      <h3>Editing: {{ product.name }}</h3>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" name="name" value="{{ product.name }}" class="form-input" required>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input type="number" name="price" value="{{ product.price }}" class="form-input" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Stock *</label>
            <input type="number" name="stock" value="{{ product.stock }}" class="form-input" min="0" required>
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Low Stock Threshold</label>
            <input type="number" name="low_stock_threshold" value="{{ product.low_stock_threshold }}" class="form-input" min="1">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
              <option value="">— None —</option>
              {% for cat in categories %}
              <option value="{{ cat.id }}" {% if product.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Or Create New Category</label>
          <input type="text" name="new_category" class="form-input" placeholder="Leave blank to keep current">
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-input" rows="3">{{ product.description }}</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" name="image_url" value="{{ product.image_url }}" class="form-input" placeholder="https://...">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.5rem;">
          <a href="{% url 'store_admin_dashboard' %}" class="btn btn-ghost btn-lg" style="text-align:center;">Cancel</a>
          <button type="submit" class="btn btn-store btn-lg">💾 Save Changes</button>
        </div>

      </form>
    </div>
  </div>

</div>
</div>
</main>

<footer class="footer">
  <div class="container">© {% now "Y" %} College Utility Portal</div>
</footer>
</body>
</html>
