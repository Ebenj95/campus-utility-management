{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set New Password — Campus Portal</title>
  <link rel="stylesheet" href="{% static 'printing/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="reset-card" style="background:white;border-radius:20px;padding:2.5rem;max-width:440px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div class="reset-icon">🔒</div>
    <div class="reset-title">Set New Password</div>
    <div class="reset-text">Enter your new password below.</div>
    {% if validlink %}
    <form method="post" style="text-align:left;">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password1" class="form-input" placeholder="New password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="new_password2" class="form-input" placeholder="Confirm password" required>
      </div>
      {% if form.errors %}
      <div class="alert alert-error">{{ form.errors }}</div>
      {% endif %}
      <button type="submit" class="btn-login">Set Password →</button>
    </form>
    {% else %}
    <div class="alert alert-error">This reset link is invalid or has expired. <a href="{% url 'password_reset' %}">Request a new one</a>.</div>
    {% endif %}
  </div>
</div>
</body>
</html>
